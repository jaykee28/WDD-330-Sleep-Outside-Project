<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="divider">
      <div class="logo">
        <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
        <a href="/index.html">
          Sleep <span class="highlight">Outside</span>
        </a>
      </div>

      <div class="cart">
        <a href="/cart/index.html">
          🛒 Cart
        </a>
      </div>
    </header>

    <!-- MAIN CHECKOUT -->
    <main class="divider">
      <h2>Checkout</h2>

      <section class="checkout-container">
        <!-- CUSTOMER + PAYMENT FORM -->
        <form id="checkoutForm">
          <h3>Customer Information</h3>
          <label>
            First Name:
            <input type="text" name="firstName" required />
          </label>
          <label>
            Last Name:
            <input type="text" name="lastName" required />
          </label>
          <label>
            Street Address:
            <input type="text" name="street" required />
          </label>
          <label>
            City:
            <input type="text" name="city" required />
          </label>
          <label>
            State:
            <input type="text" name="state" required />
          </label>
          <label>
            Zip Code:
            <input type="text" name="zip" required />
          </label>

          <h3>Payment Information</h3>
          <label>
            Credit Card Number:
            <input type="text" name="ccNumber" required />
          </label>
          <label>
            Expiration Date:
            <input type="text" name="ccExp" placeholder="MM/YY" required />
          </label>
          <label>
            Security Code:
            <input type="text" name="ccCvv" required />
          </label>

          <button type="submit">Place Order</button>
        </form>

        <!-- ORDER SUMMARY -->
        <aside class="order-summary">
          <h3>Order Summary</h3>
          <ul class="summary-list">
            <!-- JS will inject subtotal, tax, shipping, total here -->
          </ul>
        </aside>
      </section>

      <section class="order-summary" id="order-summary">
          <h3>Order Summary</h3>
            <p>Items: <span id="num-items">0</span></p>
            <p>Subtotal: <span id="subtotal">$0.00</span></p>
            <p>Tax (6%): <span id="tax">$0.00</span></p>
            <p>Shipping: <span id="shipping">$0.00</span></p>
            <p><strong>Order Total: <span id="order-total">$0.00</span></strong></p>
        </section>
    </main>

    <footer>&copy; NOT a real business</footer>

    <script type="module" src="/js/checkout.js"></script>
  </body>
</html>
