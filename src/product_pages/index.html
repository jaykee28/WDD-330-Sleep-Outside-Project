<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Product Details</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script type="module" src="/js/product.js"></script>
  </head>

  <body>
    <header class="divider">
      <div class="logo">
        <img src="/images/noun_Tent_2517.svg" alt="tent logo" />
        <a href="../index.html"> Sleep<span class="highlight">Outside</span></a>
      </div>

      <div class="cart">
        <a href="../cart/index.html">
          <!-- cart SVG omitted for brevity -->
        </a>
      </div>
    </header>

    <main class="divider">
      <section class="product-detail">
        <!-- Product brand -->
        <h3 id="productBrand"></h3>

        <!-- Product name -->
        <h2 class="divider" id="productName"></h2>

        <!-- Product image -->
        <img class="divider" id="productImage" src="" alt="" />

        <!-- Product price -->
        <p class="product-card__price" id="productPrice"></p>

        <!-- Product color -->
        <p class="product__color" id="productColor"></p>

        <!-- Product description -->
        <p class="product__description" id="productDescription"></p>

        <!-- Add to Cart Button -->
        <div class="product-detail__add">
          <button id="addToCart">Add to Cart</button>
        </div>
      </section>
    </main>

    <footer>&copy; NOT a real business</footer>
  </body>
</html>
